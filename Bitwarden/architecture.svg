<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b7c"/>
    </marker>
  </defs>
  <rect width="800" height="260" fill="#0f1620"/>
  <text x="400" y="32" text-anchor="middle" fill="#e8edf2" font-size="18" font-weight="600">Self-Hosted Bitwarden — No Public IP Needed</text>

  <g font-size="13" fill="#0f1620">
    <rect x="20" y="90" width="140" height="70" rx="10" fill="#b8c0ff"/>
    <text x="90" y="115" text-anchor="middle" font-weight="600">User</text>
    <text x="90" y="133" text-anchor="middle">bitwarden.you.com</text>

    <rect x="200" y="90" width="170" height="70" rx="10" fill="#a3a1ff"/>
    <text x="285" y="115" text-anchor="middle" font-weight="600" fill="#fff">Cloudflare Tunnel</text>
    <text x="285" y="133" text-anchor="middle" fill="#fff">No open inbound ports</text>

    <rect x="410" y="90" width="170" height="70" rx="10" fill="#7371fc"/>
    <text x="495" y="115" text-anchor="middle" font-weight="600" fill="#fff">nginx (TLS)</text>
    <text x="495" y="133" text-anchor="middle" fill="#fff">Let's Encrypt cert</text>

    <rect x="620" y="90" width="160" height="70" rx="10" fill="#5e60ce"/>
    <text x="700" y="115" text-anchor="middle" font-weight="600" fill="#fff">Bitwarden</text>
    <text x="700" y="133" text-anchor="middle" fill="#fff">Docker containers</text>
  </g>

  <line x1="160" y1="125" x2="198" y2="125" stroke="#5b6b7c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="125" x2="408" y2="125" stroke="#5b6b7c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="125" x2="618" y2="125" stroke="#5b6b7c" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="400" y="210" text-anchor="middle" fill="#8a99a8" font-size="12">Cloudflared establishes an outbound-only tunnel, so the host stays reachable without a public IP or open firewall ports</text>
</svg>
